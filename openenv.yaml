name: codesentinel
version: "1.0.0"
description: >
  CodeSentinel is an OpenEnv environment that trains AI agents to detect
  and fix real-world Python code bugs. The agent reviews buggy code snippets
  and must identify the bug type (security/logic/performance/null_reference/
  exception_handling), assign severity (1-5), locate the bug line, and write
  corrected code. Multi-dimensional reward covers bug classification accuracy,
  severity rating, line localization, and fix quality.
tags:
  - openenv
  - code-review
  - security
  - real-world
  - nlp
tasks:
  - name: easy
    description: "Identify bug type only"
    difficulty: easy
    max_steps: 5
    reward_range: [0.0, 1.0]
  - name: medium
    description: "Bug type + severity + line number"
    difficulty: medium
    max_steps: 7
    reward_range: [0.0, 1.0]
  - name: hard
    description: "Bug type + severity + line + write fixed code"
    difficulty: hard
    max_steps: 8
    reward_range: [0.0, 1.0]
observation_space:
  type: object
  fields:
    snippet_id:      { type: string }
    title:           { type: string }
    language:        { type: string }
    code:            { type: string }
    task_description:{ type: string }
    step:            { type: integer }
    total_snippets:  { type: integer }
    done:            { type: boolean }
action_space:
  type: object
  fields:
    bug_type:
      type: string
      enum: [security, logic, performance, null_reference, exception_handling]
    severity:
      type: integer
      range: [1, 5]
    bug_line:
      type: integer
    fixed_code:
      type: string
      required: false
    explanation:
      type: string
      required: false
reward:
  type: float
  range: [0.0, 1.0]
endpoints:
  health: GET  /health
  tasks:  GET  /tasks
  reset:  POST /reset
  step:   POST /step
  state:  GET  /state