version = 1
revision = 1
requires-python = ">=3.11"

[[package]]
name = "codesentinel"
version = "1.0.0"
source = { virtual = "." }
dependencies = [
    { name = "fastapi" },
    { name = "uvicorn" },
    { name = "pydantic" },
    { name = "requests" },
    { name = "openai" },
    { name = "python-dotenv" },
]

[package.metadata]
requires-dist = [
    { name = "fastapi", specifier = ">=0.110.0" },
    { name = "uvicorn", specifier = ">=0.29.0" },
    { name = "pydantic", specifier = ">=2.0.0" },
    { name = "requests", specifier = ">=2.31.0" },
    { name = "openai", specifier = ">=1.0.0" },
    { name = "python-dotenv", specifier = ">=1.0.0" },
]
